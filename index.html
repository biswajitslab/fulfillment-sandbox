const { useEffect, useRef, useState, useCallback } = React;

const App = () => {

  // Global Intersection Observer for the CSS Reveal System
  useEffect(() => {
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.15,
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
          // Optional: Stop observing after reveal for one-time animation
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    const revealElements = document.querySelectorAll('.reveal');
    revealElements.forEach((el) => observer.observe(el));

    return () => observer.disconnect();
  }, []);

  return (
    <div className="font-body text-slate-900 bg-slate-50 relative overflow-hidden selection:bg-[#1E3A8A] selection:text-white">
      <NoiseOverlay />
      <Navbar />
      <main>

        <Process />
        <Valuation />
        <About />
        <Testimonials />
        <FAQ />
        <CTASection />
      </main>
      <Footer />
    </div>
  );
};

  <!-- Reveal Observer: Triggers CSS animations when sections scroll into view -->
  <script>
  (function() {
    function initReveal() {
      var els = document.querySelectorAll(".reveal");
      if (!els.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("revealed");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
      els.forEach(function(el) { observer.observe(el); });
    }
    /* Wait for React to render, then init observer */
    var checkInterval = setInterval(function() {
      if (document.querySelectorAll(".reveal").length > 0) {
        clearInterval(checkInterval);
        setTimeout(initReveal, 100);
      }
    }, 200);
    /* Ultimate failsafe: force all content visible after 6s */
    setTimeout(function() {
      clearInterval(checkInterval);
      document.querySelectorAll(".reveal:not(.revealed)").forEach(function(el) {
        el.classList.add("revealed");
      });
    }, 6000);
  })();
  </script>
